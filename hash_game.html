<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8"/>
  <title>Hash</title>
  <style>
    @keyframes dots {
      50% {
        transform: translateY(-0.5rem);
      }
    }
    .d {
      animation: dots 1.5s ease-out infinite;
    }
    .d-2 {
      animation-delay: .5s;
    }
    .d-3 {
      animation-delay: 1s;
    }
    .lock {
      position: absolute;
      background-color: rgba(0,0,0,0.5);
      top: 0%;
      left: 0%;
      right: 0%;
      height: 719px;

      font-size: 1rem;
      font-family: system-ui;
      font-weight: bolder;
      align-items: center;
      justify-content: center;
      color: blue;
    }
    .label-radio {
      font: 1.2rem 'Fira Sans', sans-serif;
      font-weight: bolder;
      // font-weight: bold;
    }
    .button {
      width: 120.5px;
      height: 30px;
      border-radius: 6px;
      font-size: 17px;
      background: #077290;
      border: none;
      color: #FFFFFF;
    }
    .btnOp {
      font: 4rem 'Fira Sans', sans-serif;
      font-weight: bold;
      color: white;
      background: white;
      border: none;
      width: 80px;
      height: 80px;
    }
    .number {
      width: 200px;
      height: 30px;
      border-radius: 6px;
      font-size: 17px;
      background: white;
      color: #5f6774;
      border: none;
    }
  </style>
</head>
<body bgcolor='#E8ECEE'>
    <input type='button' class='button' value='Back' onclick='location.href="/index.html";'>
    <h1 style='color:#5f6774;'>Hash Game</h1>
    <form name='Hash'>
      <table>
        <tr>
          <td><input id='0' type='button' class='btnOp' value='X' onClick='setValue(this, 0)'></td>
          <td><input id='1' type='button' class='btnOp' value='X' onClick='setValue(this, 1)'></td>
          <td><input id='2' type='button' class='btnOp' value='X' onClick='setValue(this, 2)'></td>
        </tr>
        <tr>
          <td><input id='3' type='button' class='btnOp' value='X' onClick='setValue(this, 3)'></td>
          <td><input id='4' type='button' class='btnOp' value='X' onClick='setValue(this, 4)'></td>
          <td><input id='5' type='button' class='btnOp' value='X' onClick='setValue(this, 5)'></td>
        </tr>
        <tr>
          <td><input id='6' type='button' class='btnOp' value='X' onClick='setValue(this, 6)'></td>
          <td><input id='7' type='button' class='btnOp' value='X' onClick='setValue(this, 7)'></td>
          <td><input id='8' type='button' class='btnOp' value='X' onClick='setValue(this, 8)'></td>
        </tr>
      </table>
    </form>

    <br>
    <input id="newgame-id" type='button' class='button' value='New game' onClick='newGame()'>
    <br><br>
    Opponent:

<script>
  const combinations = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
  ];
  setDisabled(['X', 'O'], true);
  var level = null;
  var machine = false;
  var remote = false;
  var available = [0, 1, 2, 3, 4, 5, 6, 7, 8];
  var player = true;
  var choices = {
    true: [],
    false: []
  };
  var markers = {true: 'X', false: 'O'};
  var url = '';

  function setValue(obj, value) {
    if (available.includes(value)) {
      obj.value = markers[player];
      obj.setAttribute('style', 'color:black;');
      available = available.filter(item => item !== value);
      choices[player].push(value);
      verify(player);
      player = !player;

      if (!player && machine) {
        auto();
      }

      if (!player && remote) {
        setLoading('Sending your choice');
        putData(value);
      }
    }
  }

  async function putData(value) {
    var res = await fetch(url, {
      method: 'PUT',
      headers: {
        'mode': 'no-cors',
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({value: value})
    });
    if (res.status === 200 && res.headers.get('Content-Type') === 'application/json') {
      closeLoading();
      if (available.length > 0) {
        setLoading('Wait for the opponent');
        getData();
      }
    } else {
      alert('Trying to reconnect.');
      setTimeout(() => { putData(value) }, 1000);
    }
  }

  async function getData() {
    var res = await fetch(url);
    if (res.status === 200 && res.headers.get('Content-Type') === 'application/json') {
      var data = await res.json();
      console.log('value:', data['value']);
      if (available.includes(data['value'])) {
        setTimeout(closeLoading, 0);
        obj = document.getElementById(`${data['value']}`);
        setValue(obj, data['value']);
      } else {
        setTimeout(getData, 1000);
      }
    } else {
      alert('Trying to reconnect.');
      setTimeout(getData, 1000);
    }
  }

  async function postData() {
    setLoading('Generating a new code');
    var res = await fetch('https://jsonblob.com/api/jsonBlob', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({value: null})
    });
    if (res.status === 201 && res.headers.get('Content-Type') === 'application/json') {
      url = res.headers.get('Location').replace('http:', 'https:');
      closeLoading();
      setLoading(`<a href="whatsapp://send?abid=phonenumber&text=${url.split('/')[5]}" style="text-decoration:none";>Click to share code: ${url.split('/')[5]}</a>`);
      waitAccept();
    } else {
      alert('Trying to reconnect.');
      setTimeout(postData, 1000);
    }
  }

  async function deleteData() {
    var res = await fetch(url, {
      method: 'DELETE'
    });
    console.log(res.status === 200);
  }

  async function waitAccept() {
    // Wait for someone to accept
    console.log("url:", url);

    var res = await fetch(url);
    if (res.status === 200 && res.headers.get('Content-Type') === 'application/json') {
      var data = await res.json();
      console.log('value:', data['value']);
      if (data['value'] === 'accept') {
        closeLoading();
        alert('Ok, aceitaram! Você começa o jogo.');
        machine = false;
        remote = true;
      } else {
        setTimeout(waitAccept, 1000);
      }
    } else {
      alert('Trying to reconnect.');
      setTimeout(waitAccept, 1000);
    }
  }

  function verify(player) {
    setDisabled(['X', 'O', 'oponent-select'], true);
    for (var i = 0; i < combinations.length; i++) {
      if (combinations[i].every(e => choices[player].indexOf(e) !== -1)) {
        available = [];
        blink(combinations[i]);
        return;
      }
    }

    if (available.length === 0) {
      blink([0, 1, 2, 3, 4, 5, 6, 7, 8]);
    }
  }

  function verifyOriginal(_choices) {
    for (var i = 0; i < combinations.length; i++) {
      if (combinations[i].every(e => _choices.indexOf(e) !== -1)) {
        return true;
      }
    }
    return false;
  }

  function auto() {
    if (level !== 'bot') {
      for (var i = 0; i < available.length; i++) {
        var temp = choices[false].slice();
        temp.push(available[i]);
        if (verifyOriginal(temp)) {
          value = available[i];
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }

      for (var i = 0; i < available.length; i++) {
        var temp = choices[true].slice();
        temp.push(available[i]);
        if (verifyOriginal(temp)) {
          value = available[i];
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }
    }

    if (level === 'hardbot') {
      for (var i = 0; i < scenarios.length; i++) {
        var [A, B, C] = scenarios[i];
        if (isEqual(A, choices[true]) && isEqual(B, choices[false])) {
          value = choice(C);
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }
    }

    value = choice(available);
    obj = document.getElementById(`${value}`);
    setValue(obj, value);
    return;
  }

  function setMarker(obj) {
    setDisabled(['X', 'O'], true);
    if (obj.value == 'X') {
      player = true;
    } else if (obj.value == 'O') {
      player = false;
      markers = {true: "O", false: "X"};
      if (machine) auto();
    }
  }

  function setRemoteOpponent(obj) {
    var code = prompt('Enter code.');
    if (code === null) {
      setHumanOpponent(obj);
      return;
    }

    setLoading('Validating the code');
    // https://jsonblob.com/api/jsonBlob/943721425269964800
    // https://jsonblob.com/api/jsonBlob/943680517434523648
    url = `https://jsonblob.com/api/jsonBlob/${code}`;
    fetch(url, {
      method: 'PUT',
      headers: {
        'mode': 'no-cors',
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({value:'accept'})
    }).then(res => {
      if (res.status !== 200)
        throw new Error('');
      closeLoading();
      machine = false;
      remote = true;
      var sel = document.getElementById('O');
      sel.checked = true;
      setMarker(sel);

      /*setInterval(() => {
        fetch(url, {
          method: 'PUT',
          headers: {
            'mode': 'no-cors',
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({value: choice([0,1,2,3,4,5,6,7,8])})
        });
      }, 2000);*/

      setLoading('Wait for the opponent');
      getData();
    }).catch(err => {
      closeLoading();
      alert('Invalid code');
      setHumanOpponent(obj);
    });
  }

  function setHumanOpponent(obj) {
    obj.value = 'human';
    machine = false;
    remote = false;
    setDisabled(['X', 'O'], true);
  }

  function setOpponent(obj) {
    if (obj.value === 'remote') {
      setRemoteOpponent(obj);
    } else if (obj.value === 'remotecreate') {
      postData();
    } else if (obj.value === 'human') {
      setHumanOpponent(obj);
    } else {
      level = obj.value;
      machine = true;
      remote = false;
      setDisabled(['X', 'O'], false);
    }
  }

  function newGame() {
    setDisabled(['oponent-select'], false);
    if (machine) {
      setDisabled(['X', 'O'], false);
      document.getElementById('X').checked = true;
      markers = {true: 'X', false: 'O'};
    } else if (remote) {
      document.location.reload(true);
    }

    available = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    available.forEach(element => {
      obj = document.getElementById(`${element}`);
      obj.setAttribute('style', 'color:white;');
      obj.value = 'N';
      // obj.style.backgroundColor = 'white';
    });

    player = true;
    choices = {
      true: [],
      false: []
    };
  }

  function setDisabled(ids, status) {
    ids.forEach(id => {
      document.getElementById(id).disabled = status;
    });
  }

  function isEqual(arr1, arr2) {
    if (arr1.length === arr2.length) {
      return arr1.every(x => arr2.includes(x));
    }
    return false;
  }

  function choice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function changeColor(ids, color) {
    ids.forEach(id => {
      document.getElementById(`${id}`)
        .setAttribute('style', `color:${color};`);
      // document.getElementById(`${id}`).style.backgroundColor = color;
    });
  }

  function blink(ids) {
    setDisabled(['newgame-id'], true);
    setTimeout(() => { changeColor(ids, 'red') }, 400);
    setTimeout(() => { changeColor(ids, 'black') }, 800);
    setTimeout(() => { changeColor(ids, 'red') }, 1200);
    setTimeout(() => { changeColor(ids, 'black') }, 1600);
    setTimeout(() => { changeColor(ids, 'red'); setDisabled(['newgame-id'], false) }, 2000);
  }

  function closeLoading() {
    if (( obj = document.getElementById('lock-id') )) {
      // obj.style.display = 'none';
      obj.remove();
    }
  }

  function setLoading(message) {
    var obj = document.createElement('div');
    obj.setAttribute('class', 'lock');
    obj.setAttribute('id', 'lock-id');
    document.body.insertBefore(obj, document.firstElement);
    obj.innerHTML = message + '<span class="d">.</span><span class="d d-2">.</span><span class="d d-3">.</span>';
    obj.style.display = 'flex';
  }
