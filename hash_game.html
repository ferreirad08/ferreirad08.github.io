<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8"/>
  <title>Hash</title>
  <style>
    .label-radio {
      font: 1.2rem 'Fira Sans', sans-serif;
      font-weight: bolder;
      // font-weight: bold;
    }
    .button {
      width: 120.5px;
      height: 30px;
      border-radius: 6px;
      font-size: 17px;
      background: #077290;
      border: none;
      color: #FFFFFF;
    }
    .btnOp {
      font: 4rem 'Fira Sans', sans-serif;
      font-weight: bold;
      color: white;
      background: white;
      border: none;
      width: 80px;
      height: 80px;
    }
    .number {
      width: 150px;
      height: 30px;
      border-radius: 6px;
      font-size: 17px;
      background: white;
      color: #5f6774;
      border: none;
    }
  </style>
</head>
<body bgcolor='#E8ECEE'>
    <input type='button' class='button' value='Back' onclick='location.href="/index.html";'>
    <h1 style='color:#5f6774;'>Hash Game</h1>
    <form name='Hash'>
      <table>
        <tr>
          <td><input id='0' type='button' class='btnOp' value='X' onClick='setValue(this, 0)'></td>
          <td><input id='1' type='button' class='btnOp' value='X' onClick='setValue(this, 1)'></td>
          <td><input id='2' type='button' class='btnOp' value='X' onClick='setValue(this, 2)'></td>
        </tr>
        <tr>
          <td><input id='3' type='button' class='btnOp' value='X' onClick='setValue(this, 3)'></td>
          <td><input id='4' type='button' class='btnOp' value='X' onClick='setValue(this, 4)'></td>
          <td><input id='5' type='button' class='btnOp' value='X' onClick='setValue(this, 5)'></td>
        </tr>
        <tr>
          <td><input id='6' type='button' class='btnOp' value='X' onClick='setValue(this, 6)'></td>
          <td><input id='7' type='button' class='btnOp' value='X' onClick='setValue(this, 7)'></td>
          <td><input id='8' type='button' class='btnOp' value='X' onClick='setValue(this, 8)'></td>
        </tr>
      </table>
    </form>

    <br>
    <input type='button' class='button' value='New game' onClick='newGame()'>
    <br><br>
    Opponent:
    <select name='oponent-select' id='oponent-select' class='number' onchange="setOpponent(this.value)">
      <option value='human' selected>Human</option>
      <option value='bot'>Easy bot</option>
      <option value='mediumbot'>Medium bot</option>
      <option value='hardbot'>Hard bot</option>
    </select>

    <br><br>
    Your symbol:
    <input type='radio' id='X' name='marker' value='X' onClick='setMarker(this)' checked>
    &#10008;
    <input type='radio' id='O' name='marker' value='O' onClick='setMarker(this)'>
    <b style='font-size: 1.06rem'>&#128319;<b>
</body>
<script>
  const combinations = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
  ];
  setDisabled(['X', 'O'], true);
  var level = null;
  var machine = false;
  var remote = false;
  var available = [0, 1, 2, 3, 4, 5, 6, 7, 8];
  var player = true;
  var choices = {
    true: [],
    false: []
  };
  var markers = {true: 'X', false: 'O'};
  var url = 'https://jsonblob.com/api/jsonBlob/943721425269964800';

  function setValue(obj, value) {
    if (available.includes(value)) {
      obj.value = markers[player];
      obj.setAttribute('style', 'color:black;');
      available = available.filter(item => item !== value);
      choices[player].push(value);
      verify(player);
      player = !player;

      if (!player && machine) {
        auto();
      }

      if (!player && remote) {
        putData(value);
      }
    }
  }

  async function putData(lastChoice) {
    console.log('putData');

    var res = await fetch(url, {
      method: 'PUT',
      headers: {
        'mode': 'no-cors',
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({value:lastChoice})
    });
    if (res.status === 200 && res.headers.get('Content-Type') === 'application/json') {
      setTimeout(() => { getData(lastChoice) }, 1000);
    } else {
      alert('Tentando reconectar.');
      setTimeout(() => { putData(lastChoice) }, 1000);
    }
  }

  async function getData(lastChoice) {
    console.log('getData');

    var res = await fetch(url);
    if (res.status === 200 && res.headers.get('Content-Type') === 'application/json') {
      var data = await res.json();
      if (data['value'] === lastChoice) {
        setTimeout(() => { getData(lastChoice) }, 1000);
      } else {
        obj = document.getElementById(`${data['value']}`);
        setValue(obj, data['value']);
      }
    } else {
      alert('Tentando reconectar.');
      setTimeout(() => { getData(lastChoice) }, 1000);
    }
  }

  function verify(player) {
    setDisabled(['X', 'O', 'oponent-select'], true);
    for (var i = 0; i < combinations.length; i++) {
      if (combinations[i].every(e => choices[player].indexOf(e) !== -1)) {
        available = [];
        blink(combinations[i]);
        return;
      }
    }

    if (available.length == 0) {
      blink([0, 1, 2, 3, 4, 5, 6, 7, 8]);
    }
  }

  function verifyOriginal(_choices) {
    for (var i = 0; i < combinations.length; i++) {
      if (combinations[i].every(e => _choices.indexOf(e) !== -1)) {
        return true;
      }
    }
    return false;
  }

  function auto() {
    if (level !== 'bot') {
      for (var i = 0; i < available.length; i++) {
        var temp = choices[false].slice();
        temp.push(available[i]);
        if (verifyOriginal(temp)) {
          value = available[i];
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }

      for (var i = 0; i < available.length; i++) {
        var temp = choices[true].slice();
        temp.push(available[i]);
        if (verifyOriginal(temp)) {
          value = available[i];
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }
    }

    if (level === 'hardbot') {
      for (var i = 0; i < scenarios.length; i++) {
        var [A, B, C] = scenarios[i];
        if (isEqual(A, choices[true]) && isEqual(B, choices[false])) {
          value = choice(C);
          obj = document.getElementById(`${value}`);
          setValue(obj, value);
          return;
        }
      }
    }

    value = choice(available);
    obj = document.getElementById(`${value}`);
    setValue(obj, value);
    return;
  }

  function setMarker(obj) {
    setDisabled(['X', 'O'], true);
    if (obj.value == 'X') {
      player = true;
    } else if (obj.value == 'O') {
      player = false;
      markers = {true: "O", false: "X"};
      auto();
    }
  }

  function setOpponent(value) {
    if (value == 'human') {
      machine = false;
      setDisabled(['X', 'O'], true);
    } else {
      level = value;
      machine = true;
      setDisabled(['X', 'O'], false);
    }
  }

  function newGame() {
    setDisabled(['oponent-select'], false);
    if (machine) {
      setDisabled(['X', 'O'], false);
      document.getElementById('X').checked = true;
      markers = {true: 'X', false: 'O'};
    }

    available = [0, 1, 2, 3, 4, 5, 6, 7, 8];
    available.forEach((element) => {
      obj = document.getElementById(`${element}`);
      obj.setAttribute('style', 'color:white;');
      obj.value = 'X';
      obj.style.backgroundColor = 'white';
    });

    player = true;
    choices = {
      true: [],
      false: []
    };
  }

  function setDisabled(ids, status) {
    ids.forEach(id => {
      document.getElementById(id).disabled = status;
    });
  }

  function isEqual(arr1, arr2) {
    if (arr1.length === arr2.length) {
      return arr1.every(x => arr2.includes(x));
    }
    return false;
  }

  function choice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function changeColor(ids, color) {
    ids.forEach(id => {
      document.getElementById(`${id}`)
        .setAttribute('style', `color:${color};`);
      // document.getElementById(`${id}`).style.backgroundColor = color;
    });
  }

  function blink(ids) {
    setTimeout(() => { changeColor(ids, 'red') }, 400);
    setTimeout(() => { changeColor(ids, 'black') }, 800);
    setTimeout(() => { changeColor(ids, 'red') }, 1200);
    setTimeout(() => { changeColor(ids, 'black') }, 1600);
    setTimeout(() => { changeColor(ids, 'red') }, 2000);
  }

  const scenarios = [
    // Y list
    [[1, 6], [4], [2]],
    [[1, 8], [4], [0]],
    [[2, 3], [4], [6]],
    [[3, 8], [4], [0]],
    [[0, 5], [4], [8]],
    [[5, 6], [4], [2]],
    [[0, 7], [4], [8]],
    [[2, 7], [4], [6]],

    // diagonals
    [[4, 8], [0], [2, 6]],
    [[0, 8], [4], [1, 3, 5, 7]],
    [[0, 4], [8], [2, 6]],
    [[4, 6], [2], [0, 8]],
    [[2, 6], [4], [1, 3, 5, 7]],
    [[2, 4], [6], [0, 8]],

    // V attack
    [[5], [0], [6]],
    [[3], [2], [8]],
    [[1], [6], [8]],
    [[1], [8], [6]],
    [[7], [0], [2]],
    [[7], [2], [0]],
    [[5], [6], [0]],
    [[3], [8], [2]],

    // Vizinho lados
    [[1], [0], [4]],
    [[1], [2], [4]],
    [[3], [6], [4]],
    [[5], [8], [4]],
    [[3], [0], [4]],
    [[5], [2], [4]],
    [[7], [6], [4]],
    [[7], [8], [4]],
    [[0, 5], [4, 8], [6]],
    [[0, 7], [4, 8], [2]],
    [[2, 3], [4, 6], [8]],
    [[2, 7], [4, 6], [0]],
    [[6, 1], [4, 2], [8]],
    [[6, 5], [4, 2], [0]],
    [[8, 1], [4, 0], [6]],
    [[8, 3], [4, 0], [2]],

    // Mais aberto
    [[2], [0], [8]],
    [[6], [0], [8]],
    [[0], [2], [6]],
    [[8], [2], [6]],
    [[0], [6], [2]],
    [[8], [6], [2]],
    [[2], [8], [0]],
    [[6], [8], [0]],

    // Opostos
    [[8], [0], [2, 6]],
    [[6], [2], [0, 8]],
    [[2], [6], [0, 8]],
    [[0], [8], [2, 6]],
    [[3, 8], [0, 6], [2]],
    [[1, 8], [0, 2], [6]],
    [[1, 6], [2, 0], [8]],
    [[5, 6], [2, 8], [0]],
    [[2, 3], [0, 6], [8]],
    [[2, 7], [6, 8], [0]],
    [[0, 5], [2, 8], [6]],
    [[0, 7], [6, 8], [2]],

    // Primeira jogada
    [[], [], [0, 2, 6, 8]],
    [[0], [], [4]],
    [[1], [], [4]],
    [[2], [], [4]],
    [[3], [], [4]],
    [[4], [], [0, 2, 6, 8]],
    [[5], [], [4]],
    [[6], [], [4]],
    [[7], [], [4]],
    [[8], [], [4]]
  ]
</script>
</html>
